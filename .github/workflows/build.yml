name: Build KoboldCpp + ROCm

on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Clone koboldcpp
        run: git clone --depth 1 https://github.com/LostRuins/koboldcpp.git

      - name: Download ROCm SDK
        shell: pwsh
        run: |
          $prefix = "therock-dist-windows-gfx103X-dgpu-7"
          $xml = [xml](Invoke-WebRequest "https://therock-nightly-tarball.s3.amazonaws.com/?prefix=$prefix").Content
          $latest = $xml.ListBucketResult.Contents.Key | Sort-Object -Descending | Select-Object -First 1
          Write-Host "Downloading $latest"
          Invoke-WebRequest "https://therock-nightly-tarball.s3.amazonaws.com/$latest" -OutFile rocm.tar.gz
          New-Item -ItemType Directory -Force -Path C:\opt\rocm
          tar -xzf rocm.tar.gz -C C:\opt\rocm --strip-components=1

      - name: Build with HIP
        shell: cmd
        run: |
          set PATH=C:\opt\rocm\lib\llvm\bin;C:\opt\rocm\bin;%PATH%
          set HIP_PATH=C:\opt\rocm
          set ROCM_PATH=C:\opt\rocm
          for /f "usebackq tokens=*" %%i in (`vswhere -latest -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set VS_PATH=%%i
          call "%VS_PATH%\VC\Auxiliary\Build\vcvars64.bat"
          cd koboldcpp
          mkdir build && cd build
          cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release -DGGML_HIP=ON -DGPU_TARGETS="gfx1030;gfx1031" -DBUILD_SHARED_LIBS=ON -DLLAMA_BUILD_TESTS=OFF -DGGML_OPENMP=OFF -DCMAKE_SYSTEM_NAME=Windows -DCMAKE_C_COMPILER="C:\opt\rocm\lib\llvm\bin\clang.exe" -DCMAKE_CXX_COMPILER="C:\opt\rocm\lib\llvm\bin\clang++.exe"
          cmake --build . -j 4

      - name: Bundle
        shell: pwsh
        run: |
          $out = "koboldcpp\build\bin"
          $rocm = "C:\opt\rocm\bin"
          foreach ($dll in "amdhip64_*.dll","rocm_kpack.dll","hipblas.dll","rocblas.dll","rocsolver.dll","libhipblas.dll","libhipblaslt.dll") {
            Copy-Item (Join-Path $rocm $dll) $out -Force -ErrorAction SilentlyContinue
          }
          if (Test-Path "$rocm\rocblas\library") { Copy-Item "$rocm\rocblas\library" "$out\rocblas\library" -Recurse -Force }

      - uses: actions/upload-artifact@v4
        with:
          name: koboldcpp-hip
          path: koboldcpp/build/bin/
